<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório A/B — Sevilha Performance</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:   #1a1c48;
      --g1:     #3dd63a;
      --g2:     #2bbfa0;
      --g3:     #29b4f6;
      --muted:  #6b7280;
      --border: #e5e7eb;
      --bg:     #f6f7f9;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 36px;
    }
    .header-left h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .header-left p {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 4px;
    }
    .grad-text {
      background: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Cards grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 24px 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--g1), var(--g3));
    }
    .card.winner {
      border-color: var(--g2);
      box-shadow: 0 2px 16px rgba(43,191,160,0.12);
    }

    .card-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .card-title {
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
      color: #fff;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .metric {}
    .metric-value {
      font-family: 'Poppins', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1;
      color: var(--navy);
    }
    .metric-value.highlight {
      background: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .metric-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Divider bar ── */
    .divider {
      height: 2px;
      background: linear-gradient(90deg, var(--g1), var(--g3));
      border-radius: 2px;
      width: 40px;
      margin-bottom: 20px;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--g2);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.85); }
    }

    /* ── Error ── */
    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }

    /* ── Skeleton ── */
    .skeleton .metric-value {
      background: #e8eaed !important;
      color: transparent !important;
      -webkit-text-fill-color: transparent !important;
      border-radius: 6px;
      animation: shimmer 1.4s ease infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ── URL hint ── */
    .url-hint {
      display: inline-block;
      font-size: 0.72rem;
      color: var(--muted);
      background: #f0f1f3;
      padding: 3px 10px;
      border-radius: 6px;
      font-family: monospace;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-left">
        <h1>Relatório <span class="grad-text">A/B</span></h1>
        <p>Sevilha Performance · Clube da Performance · Comparativo de variantes</p>
      </div>
    </div>

    <div class="cards" id="cards">
      <!-- Skeleton enquanto carrega -->
      <div class="card skeleton">
        <div class="card-eyebrow">Variante 0</div>
        <div class="card-title">Página 1 (Principal)</div>
        <div class="divider"></div>
        <div class="metrics">
          <div class="metric"><div class="metric-value">000</div><div class="metric-label">Visitas</div></div>
          <div class="metric"><div class="metric-value">00</div><div class="metric-label">Leads</div></div>
          <div class="metric"><div class="metric-value highlight">0%</div><div class="metric-label">Conversão</div></div>
        </div>
      </div>
      <div class="card skeleton">
        <div class="card-eyebrow">Variante 1</div>
        <div class="card-title">Página 2</div>
        <div class="divider"></div>
        <div class="metrics">
          <div class="metric"><div class="metric-value">000</div><div class="metric-label">Visitas</div></div>
          <div class="metric"><div class="metric-value">00</div><div class="metric-label">Leads</div></div>
          <div class="metric"><div class="metric-value highlight">0%</div><div class="metric-label">Conversão</div></div>
        </div>
      </div>
      <div class="card skeleton">
        <div class="card-eyebrow">Variante 2</div>
        <div class="card-title">Página 3</div>
        <div class="divider"></div>
        <div class="metrics">
          <div class="metric"><div class="metric-value">000</div><div class="metric-label">Visitas</div></div>
          <div class="metric"><div class="metric-value">00</div><div class="metric-label">Leads</div></div>
          <div class="metric"><div class="metric-value highlight">0%</div><div class="metric-label">Conversão</div></div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="dot"></div>
      <span id="status-text">Carregando dados...</span>
    </div>
    <div class="error-msg" id="error-msg"></div>

  </div>

  <script>
    var REFRESH_MS = 30000;

    var PAGE_LABELS = {
      '/':                'Página 1 (Principal)',
      '/pre-inscricao-2': 'Página 2',
      '/pre-inscricao-3': 'Página 3',
    };

    var PAGE_URLS = {
      '/':                'pg.sevilhaperformance.com.br',
      '/pre-inscricao-2': 'pg.sevilhaperformance.com.br/pre-inscricao-2',
      '/pre-inscricao-3': 'pg.sevilhaperformance.com.br/pre-inscricao-3',
    };

    function fmt(n) {
      return Number(n).toLocaleString('pt-BR');
    }

    function renderCards(variants) {
      var maxRate = -1;
      variants.forEach(function(v) {
        if (v.visits > 0 && v.conversion_rate > maxRate) maxRate = v.conversion_rate;
      });

      var html = variants.map(function(v) {
        var isWinner = v.visits > 0 && v.conversion_rate === maxRate;
        var label    = PAGE_LABELS[v.pagina] || v.pagina;
        var url      = PAGE_URLS[v.pagina]   || v.pagina;

        return [
          '<div class="card' + (isWinner ? ' winner' : '') + '">',
          '  <div class="card-eyebrow">Variante ' + v.variant + '</div>',
          '  <div class="card-title">',
          '    <span>' + label + '</span>',
          isWinner ? '<span class="badge">Melhor</span>' : '',
          '  </div>',
          '  <div class="url-hint">' + url + '</div>',
          '  <div class="divider" style="margin-top:16px"></div>',
          '  <div class="metrics">',
          '    <div class="metric">',
          '      <div class="metric-value">' + fmt(v.visits) + '</div>',
          '      <div class="metric-label">Visitas</div>',
          '    </div>',
          '    <div class="metric">',
          '      <div class="metric-value">' + fmt(v.leads) + '</div>',
          '      <div class="metric-label">Leads</div>',
          '    </div>',
          '    <div class="metric">',
          '      <div class="metric-value highlight">' + v.conversion_rate + '%</div>',
          '      <div class="metric-label">Conversão</div>',
          '    </div>',
          '  </div>',
          '</div>',
        ].join('\n');
      }).join('\n');

      document.getElementById('cards').innerHTML = html;
    }

    function setStatus(txt) {
      document.getElementById('status-text').textContent = txt;
    }

    function setError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function load() {
      fetch('/api/stats')
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function(data) {
          renderCards(data.variants);
          var now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          setStatus('Atualizado às ' + now + ' · próxima atualização em 30s');
          setError('');
        })
        .catch(function(err) {
          setStatus('Falha ao carregar dados');
          setError('Erro: ' + err.message);
        });
    }

    load();
    setInterval(load, REFRESH_MS);
  </script>
</body>
</html>
